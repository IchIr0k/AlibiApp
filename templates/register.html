{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="container">
    <h2>Регистрация</h2>
    {% if error %}
    <div class="alert error">
        {{ error }}
    </div>
    {% endif %}
    <form method="post" class="auth-form" autocomplete="off">
        <label>
            Логин*
            <input type="text" name="username" required
                   minlength="3" maxlength="50" placeholder="Минимум 3 символа"
                   autocomplete="off">
        </label>

        <label>
            Email*
            <input type="email" name="email" required
                   placeholder="your@email.com" autocomplete="off">
        </label>

        <label>
            Пароль*
            <input type="password" name="password" required minlength="4"
                   placeholder="Минимум 4 символа" autocomplete="new-password">
        </label>

        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p style="margin-top: 20px; text-align: center;">
        Уже есть аккаунт? <a href="/login">Войти</a>
    </p>
</div>

<style>
.auth-form {
    max-width: 400px;
    margin: 0 auto;
    padding: 20px;
}

.auth-form label {
    display: block;
    margin-bottom: 15px;
    color: #e6e9fb;
}

.auth-form input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border: 1px solid #39417b;
    border-radius: 8px;
    background: #0b1330;
    color: #e6e9fb;
    box-sizing: border-box;
}

.auth-form input:focus {
    border-color: #4CAF50;
    outline: none;
}

.alert.error {
    background: #3a1a1a;
    border: 1px solid #dc3545;
    color: lightpink;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.container {
    max-width: 500px;
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Очищаем все поля при загрузке страницы
    const inputs = document.querySelectorAll('input');
    inputs.forEach(input => {
        input.value = '';
    });

    // Отключаем автозаполнение для формы
    const form = document.querySelector('.auth-form');
    if (form) {
        form.setAttribute('autocomplete', 'off');
    }

    // Дополнительная защита от автозаполнения
    setTimeout(() => {
        inputs.forEach(input => {
            if (input.value !== '') {
                input.value = '';
            }
        });
    }, 100);
});
</script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Редактировать квест{% endblock %}
{% block content %}
<div class="container">
    <h2>Редактировать квест: {{ quest.title }}</h2>

    <form action="/admin/edit/{{ quest.id }}" method="post" enctype="multipart/form-data" class="admin-form" id="editForm">
        <input type="hidden" name="clipboard_image" id="clipboardImage" value="">

        <label>Название<br>
            <input type="text" name="title" id="title" value="{{ quest.title }}" required>
        </label>

        <label>Описание<br>
            <textarea name="description" id="description" rows="4" required>{{ quest.description }}</textarea>
        </label>

        <label>Жанр (выберите хотя бы один)<br>
            <div class="checkbox-group" id="genresGroup">
                {% set current_genres = quest.genre.split(', ') %}
                <label><input type="checkbox" name="genres" value="детям" {% if "детям" in current_genres %}checked{% endif %}> Детям</label>
                <label><input type="checkbox" name="genres" value="страшные" {% if "страшные" in current_genres %}checked{% endif %}> Страшные</label>
                <label><input type="checkbox" name="genres" value="веселые" {% if "веселые" in current_genres %}checked{% endif %}> Весёлые</label>
                <label><input type="checkbox" name="genres" value="с актерами" {% if "с актерами" in current_genres %}checked{% endif %}> С актёрами</label>
                <label><input type="checkbox" name="genres" value="без актеров" {% if "без актеров" in current_genres %}checked{% endif %}> Без актёров</label>
                <label><input type="checkbox" name="genres" value="нестрашные" {% if "нестрашные" in current_genres %}checked{% endif %}> Нестрашные</label>
                <label><input type="checkbox" name="genres" value="загадки" {% if "загадки" in current_genres %}checked{% endif %}> Загадки</label>
            </div>
            <div class="error-message" id="genresError" style="display: none; color: #dc3545; margin-top: 5px;">
                Выберите хотя бы один жанр
            </div>
        </label>

        <label>Сложность<br>
            <select name="difficulty" id="difficulty" required>
                <option value="">Выберите сложность</option>
                <option value="легкий" {% if quest.difficulty == "легкий" %}selected{% endif %}>Лёгкий</option>
                <option value="нормальный" {% if quest.difficulty == "нормальный" %}selected{% endif %}>Нормальный</option>
                <option value="сложный" {% if quest.difficulty == "сложный" %}selected{% endif %}>Сложный</option>
                <option value="экстремальный" {% if quest.difficulty == "экстремальный" %}selected{% endif %}>Экстремальный</option>
            </select>
        </label>

        <label>Уровень страха (1-5)<br>
            <input type="number" name="fear_level" id="fear_level" min="1" max="5" value="{{ quest.fear_level }}" required>
        </label>

        <label>Максимальное количество игроков<br>
            <input type="number" name="max_players" id="max_players" min="1" max="6" value="{{ quest.max_players }}" required>
            <div class="error-message" id="playersError" style="display: none; color: #dc3545; margin-top: 5px;">
                Укажите количество игроков
            </div>
        </label>

        <label>Email организатора<br>
            <input type="email" name="organizer_email" id="organizer_email" value="{{ quest.organizer_email }}" required>
        </label>

        <label>Цена (руб.)<br>
            <input type="number" name="price" id="price" min="0" step="100" value="{{ quest.price }}" required>
        </label>

        <label>Текущее изображение:<br>
            {% if quest.image_path %}
            <img src="/static/{{ quest.image_path }}" alt="{{ quest.title }}" style="max-width: 200px; margin: 10px 0;">
            {% else %}
            <span>Нет изображения</span>
            {% endif %}
        </label>

        <label>Новое изображение квеста<br>
            <div class="image-upload-container">
                <input type="file" name="image" id="imageInput" accept="image/*" style="display: none;">
                <button type="button" class="btn outline" onclick="document.getElementById('imageInput').click()">
                    Выбрать файл
                </button>
                <button type="button" class="btn outline" onclick="pasteFromClipboard()">
                    Вставить из буфера обмена
                </button>
                <div id="imagePreview" style="margin-top: 10px;"></div>
            </div>
        </label>

        <button type="submit" class="btn">Сохранить изменения</button>
        <a href="/admin" class="btn outline" style="margin-left: 10px;">Отмена</a>
    </form>
</div>

<style>
.admin-form {
    max-width: 600px;
    margin: 0 auto;
}

.admin-form input,
.admin-form select,
.admin-form textarea {
    width: 100%;
    padding: 10px;
    margin: 5px 0 15px 0;
    border: 1px solid #39417b;
    border-radius: 8px;
    background: #0b1330;
    color: #e6e9fb;
    box-sizing: border-box;
}

.admin-form input:invalid,
.admin-form select:invalid,
.admin-form textarea:invalid {
    border-color: #dc3545;
}

.admin-form input:focus:invalid,
.admin-form select:focus:invalid,
.admin-form textarea:focus:invalid {
    outline: none;
    border-color: #dc3545;
}

.admin-form label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
    color: #e6e9fb;
}

.checkbox-group {
    background: #0b1330;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #39417b;
    margin-bottom: 5px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
}

.checkbox-group label {
    display: flex;
    align-items: center;
    margin-bottom: 0;
    font-weight: normal;
    cursor: pointer;
}

.checkbox-group input[type="checkbox"] {
    width: auto;
    margin-right: 10px;
    margin-bottom: 0;
}

.checkbox-group.error {
    border-color: #dc3545;
}

.error-message {
    font-size: 0.9em;
    margin-bottom: 10px;
}

.image-upload-container {
    background: var(--panel);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #39417b;
}

.image-upload-container .btn {
    margin-right: 10px;
    margin-bottom: 10px;
}

.btn {
    background: var(--btn);
    padding: 10px 20px;
    border-radius: 8px;
    color: white;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-size: 1em;
    margin-right: 10px;
}

.btn:hover {
    background: #3a44e0;
}

.btn.outline {
    background: transparent;
    border: 1px solid #39417b;
    color: #dfe6ff;
}

.btn.outline:hover {
    background: rgba(255,255,255,0.1);
}

.btn.danger {
    background: #b33a3a;
}

.btn.danger:hover {
    background: #9a2e2e;
}
</style>

<script>
let clipboardImageData = null;

// Обработка выбора файла
document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        previewImage(file);
    }
});

// Вставка из буфера обмена
async function pasteFromClipboard() {
    try {
        const clipboardItems = await navigator.clipboard.read();
        for (const item of clipboardItems) {
            for (const type of item.types) {
                if (type.startsWith('image/')) {
                    const blob = await item.getType(type);
                    previewImage(blob);
                    break;
                }
            }
        }
    } catch (err) {
        alert('Вставка из буфера обмена не поддерживается. Используйте кнопку "Выбрать файл"');
    }
}

// Превью изображения
function previewImage(blob) {
    const reader = new FileReader();
    reader.onload = function(e) {
        const preview = document.getElementById('imagePreview');
        preview.innerHTML = `<img src="${e.target.result}" style="max-width: 200px; max-height: 150px; margin-top: 10px;">`;
        clipboardImageData = e.target.result;
        document.getElementById('clipboardImage').value = e.target.result;
    };
    reader.readAsDataURL(blob);
}

// Обработка Ctrl+V для вставки изображения
document.addEventListener('paste', function(e) {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
        if (items[i].type.indexOf('image') !== -1) {
            const blob = items[i].getAsFile();
            previewImage(blob);
            e.preventDefault();
            break;
        }
    }
});

// Валидация формы редактирования
document.getElementById('editForm').addEventListener('submit', function(e) {
    let isValid = true;

    // Проверка названия
    const title = document.getElementById('title');
    if (!title.value.trim()) {
        title.style.borderColor = '#dc3545';
        isValid = false;
    } else {
        title.style.borderColor = '';
    }

    // Проверка описания
    const description = document.getElementById('description');
    if (!description.value.trim()) {
        description.style.borderColor = '#dc3545';
        isValid = false;
    } else {
        description.style.borderColor = '';
    }

    // Проверка жанров (хотя бы один чекбокс выбран)
    const genres = document.querySelectorAll('input[name="genres"]:checked');
    const genresGroup = document.getElementById('genresGroup');
    const genresError = document.getElementById('genresError');

    if (genres.length === 0) {
        genresGroup.classList.add('error');
        genresError.style.display = 'block';
        isValid = false;
    } else {
        genresGroup.classList.remove('error');
        genresError.style.display = 'none';
    }

    // Проверка сложности
    const difficulty = document.getElementById('difficulty');
    if (!difficulty.value) {
        difficulty.style.borderColor = '#dc3545';
        isValid = false;
    } else {
        difficulty.style.borderColor = '';
    }

    // Проверка уровня страха
    const fearLevel = document.getElementById('fear_level');
    if (!fearLevel.value || fearLevel.value < 1 || fearLevel.value > 5) {
        fearLevel.style.borderColor = '#dc3545';
        isValid = false;
    } else {
        fearLevel.style.borderColor = '';
    }

    // Проверка количества игроков
    const players = document.getElementById('max_players');
    const playersError = document.getElementById('playersError');

    if (!players.value || players.value < 1 || players.value > 6) {
        players.style.borderColor = '#dc3545';
        playersError.style.display = 'block';
        isValid = false;
    } else {
        players.style.borderColor = '';
        playersError.style.display = 'none';
    }

    // Проверка email
    const email = document.getElementById('organizer_email');
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!email.value || !emailPattern.test(email.value)) {
        email.style.borderColor = '#dc3545';
        isValid = false;
    } else {
        email.style.borderColor = '';
    }

    // Проверка цены
    const price = document.getElementById('price');
    if (!price.value || price.value < 0) {
        price.style.borderColor = '#dc3545';
        isValid = false;
    } else {
        price.style.borderColor = '';
    }

    if (!isValid) {
        e.preventDefault();
        alert('Пожалуйста, заполните все обязательные поля правильно');
    }
});

// Убираем ошибки при вводе
document.getElementById('title').addEventListener('input', function() {
    if (this.value.trim()) this.style.borderColor = '';
});

document.getElementById('description').addEventListener('input', function() {
    if (this.value.trim()) this.style.borderColor = '';
});

document.getElementById('difficulty').addEventListener('change', function() {
    if (this.value) this.style.borderColor = '';
});

document.getElementById('fear_level').addEventListener('input', function() {
    if (this.value && this.value >= 1 && this.value <= 5) this.style.borderColor = '';
});

document.getElementById('max_players').addEventListener('input', function() {
    const playersError = document.getElementById('playersError');
    if (this.value && this.value >= 1 && this.value <= 6) {
        this.style.borderColor = '';
        playersError.style.display = 'none';
    }
});

document.getElementById('organizer_email').addEventListener('input', function() {
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (this.value && emailPattern.test(this.value)) this.style.borderColor = '';
});

document.getElementById('price').addEventListener('input', function() {
    if (this.value && this.value >= 0) this.style.borderColor = '';
});

// Убираем ошибку при выборе жанра
document.querySelectorAll('input[name="genres"]').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
        const genres = document.querySelectorAll('input[name="genres"]:checked');
        const genresGroup = document.getElementById('genresGroup');
        const genresError = document.getElementById('genresError');

        if (genres.length > 0) {
            genresGroup.classList.remove('error');
            genresError.style.display = 'none';
        }
    });
});
</script>
{% endblock %}
